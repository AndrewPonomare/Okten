<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW-5.3</title>

    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="wrap">
        <header>
            <nav>
                <ul>
                    <li>
                        <a href="/">about</a>
                    </li>
                    <li>
                        <a href="/">menu</a>
                    </li>
                    <li>
                        <a class="nav__order-btn" href="/">order online</a>
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>
                NEW YORK’S FAVORITE ORGANIC HAMBURGER JOINT
            </h1>
            <section class="hero">
                <div class="hero__image">
                    <img class="burger burger--back-left" src="img/burger-1.png" alt="Burger back left">
                    <img class="burger burger--front" src="img/burger-1.png" alt="Burger front">
                    <img class="burger burger--back-right" src="img/burger-1.png" alt="Burger back right">
                </div>

                <div class="promo">
                    <div class="promo__inner">
                        <div class="promo__left">
                            <h2 class="promo__title">THE BURGER<br>ABOVE ALL<br>BURGERS</h2>
                        </div>

                        <div class="promo__right">
                            <p class="promo__text">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aenean nec ornare neque.</p>
                            <button class="promo__btn">ABOUT US</button>
                        </div>
                    </div>
                </div>
            </section>
            <section class="gallery">
                <div class="gallery__grid">
                    <div class="gallery__item">
                        <img src="img/french_fries.png" alt="Fries">
                    </div>
                    <div class="gallery__item">
                        <img src="img/burgergs.png" alt="Stacked burgers">
                    </div>
                    <div class="gallery__item gallery__item--wide">
                        <img src="img/people.png" alt="People at counter">
                    </div>
                </div>
            </section>

            <section class="cta">
                <h2 class="cta__title">ORDER ONLINE OR<br>COME VISIT US TODAY</h2>
                <button class="cta__btn">GET STARTED</button>
            </section>
        </main>
    </div>
</body>

</html>
